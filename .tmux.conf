# Core settings
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Change prefix to Ctrl+a (more accessible than Ctrl+b)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Reload tmux config with prefix+R
bind R source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Start windows and panes at 1, not 0 (easier to reach on keyboard)
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# Split panes with more intuitive keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigation shortcuts
bind-key [ previous-window
bind-key ] next-window
bind-key v copy-mode
bind-key r command-prompt -I "#W" "rename-window '%%'"
bind-key C new-window \; send-keys 'sd' C-m

# Vim-style pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Kill pane without confirmation
bind-key x kill-pane

# Copy mode settings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse support
set -g mouse on
set -s set-clipboard on

# Clean status bar at bottom
set-option -g status-position bottom
set-option -g automatic-rename off

# Very subtle pane borders - thin light gray
set -g pane-border-style 'fg=#333333,bg=default'
set -g pane-active-border-style 'fg=#444444,bg=default'
set-window-option -g pane-border-status off

# Message styling
set -g message-style 'fg=#CDD6F4,bg=#1E1E2E'
set -g message-command-style 'fg=#CDD6F4,bg=#1E1E2E'

# Minimal set of essential plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'fcsonline/tmux-thumbs'

# Minimal theme configuration
set -g @minimal-tmux-fg "#404040,italics,bold"
set -g @minimal-tmux-bg "#F5C2E7,italics,bold"
set -g @minimal-tmux-justify "centre"
set -g @minimal-tmux-indicator-str "  tmux  "
set -g @minimal-tmux-indicator true
set -g @minimal-tmux-status "bottom"
set -g @minimal-tmux-expanded-icon "   "
set -g @minimal-tmux-status-right "#S"
set -g status-right-length 20
set -g status-left-length 20

# SessionX configuration - use popup
set -g @sessionx-bind 'o'
set -g @sessionx-filter-current 'false'
set -g @sessionx-x '50%'
set -g @sessionx-y '50%'
set -g @sessionx-height '60%'
set -g @sessionx-width '80%'
set -g @sessionx-popup 'on'

# tmux-menus configuration (for popups)
set -g @menus_trigger 'F9'
set -g @menus_location_x 'C'
set -g @menus_location_y 'C'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
