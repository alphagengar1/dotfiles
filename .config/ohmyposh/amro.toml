version = 3

[secondary_prompt]
  template = '## '
  foreground = '#CD4277'
  background = 'transparent'

[transient_prompt]
  style = 'plain'
  template = "\n#  "
  foreground = '#CD4277'
  type = 'text'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    style = 'plain'
    template = ' {{ .UserName }} on'
    foreground = '#45F1C2'
    type = 'session'

  [[blocks.segments]]
    style = 'plain'
    template = '  {{ .Path }} '
    foreground = '#0CA0D8'
    type = 'path'

    [blocks.segments.properties]
      folder_separator_icon = '/'
      style = 'full'

  [[blocks.segments]]
    style = 'plain'
    template = '{{ .UpstreamIcon }}{{ .HEAD }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
    foreground = '#14A5AE'
    powerline_symbol = ''
    type = 'git'

    [blocks.segments.properties]
      fetch_stash_count = true
      fetch_upstream_icon = true

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    style = 'plain'
    template = ' '
    foreground = '#cd5e42'
    type = 'root'

  [[blocks.segments]]
    style = 'plain'
    template = '#  '
    foreground = '#CD4277'
    type = 'text'
