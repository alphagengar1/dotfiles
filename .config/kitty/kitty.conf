# Kitty equivalent of your Alacritty config

# Font configuration
font_family      JetBrainsMonoNL Nerd Font Propo Medium
bold_font        JetBrainsMonoNL Nerd Font Propo Bold
italic_font      JetBrainsMonoNL Nerd Font Propo Medium Italic
bold_italic_font JetBrainsMonoNL Nerd Font Propo Bold Italic
font_size 11

# Window configuration
window_padding_width 11 15
hide_window_decorations yes
background_opacity 0.85
dynamic_background_opacity yes
background_blur 1

# Terminal configuration
term xterm-256color

# Import theme (Catppuccin Mocha)
include ~/.config/kitty/catppuccin-mocha.conf
